services:
  mongodb:
    image: mongo:7
    container_name: ocpp-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-example}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-ocpp_emulator}
    ports:
      - '${MONGO_PORT:-27017}:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./back_end
      target: development
    container_name: ocpp-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PORT: 3000
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-example}@mongodb:27017/${MONGO_DB:-ocpp_emulator}?authSource=admin
      MONGO_DB: ${MONGO_DB:-ocpp_emulator}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    volumes:
      # Bind-mount source for hot reload, but keep the container's node_modules.
      - ./back_end:/app
      - /app/node_modules

volumes:
  mongo_data:
